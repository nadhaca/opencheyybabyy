<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Yoosu 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg,#5a0f2e,#f5e6da);
  text-align: center;
  overflow: hidden;
}

/* COUNTDOWN */
#countdown {
  position: fixed;
  width:100%;
  height:100%;
  background:#5a0f2e;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* MAIN */
#main { display:none; }

/* PIXEL BOX */
.box {
  background:#f5e6da;
  padding:25px;
  border-radius:12px;
  margin-top:100px;
}

/* BUTTONS */
button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#yes { background:#800020; color:white; }
#no { background:#ccc; position:relative; }

/* GIFTS */
#gifts { display:none; margin-top:40px; }

.gift {
  width:90px;
  height:90px;
  background:#800020;
  margin:15px;
  display:inline-block;
  border-radius:10px;
  cursor:pointer;
}

/* ITEMS */
.item { display:none; font-size:60px; }

/* LETTER */
#letter { display:none; width:80%; margin:auto; }

/* LOVE EXPLOSION */
.love {
  position:absolute;
  color:#ff4d6d;
  font-size:20px;
}

/* STARS */
#stars {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
}

.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100%{opacity:0;}
  50%{opacity:1;}
}
</style>
</head>

<body>

<!-- COUNTDOWN -->
<div id="countdown">
  <h2>⏳ Waiting for you Yoosu...</h2>
  <h1 id="timer"></h1>
</div>

<!-- MAIN -->
<div id="main">

  <div class="box" id="intro">
    <h1>HI YOOSU 💗</h1>
    <p>Do you want to see your surprise?</p>

    <button id="yes">Yes</button>
    <button id="no">No</button>

    <p>🐱 Kittu: press yes 😤</p>
  </div>

  <!-- GIFTS -->
  <div id="gifts">
    <div class="gift" onclick="openGift(0)"></div>
    <div class="gift" onclick="openGift(1)"></div>
    <div class="gift" onclick="openGift(2)"></div>
    <div class="gift" onclick="openGift(3)"></div>

    <div id="cake" class="item">🎂</div>
    <div id="letter" class="item"></div>
    <div id="flowers" class="item">🌸🌸🌸</div>
  </div>

</div>

<div id="stars"></div>

<audio id="music" src="song.mp3"></audio>

<script>
// COUNTDOWN LOCK
let target = new Date("April 24, 2026 00:00:00").getTime();

setInterval(()=>{
  let now = new Date().getTime();
  let d = target - now;

  if(d < 0){
    countdown.style.display="none";
    main.style.display="block";
  } else {
    timer.innerHTML =
    Math.floor(d/86400000)+"d "+
    Math.floor(d%86400000/3600000)+"h "+
    Math.floor(d%3600000/60000)+"m "+
    Math.floor(d%60000/1000)+"s";
  }
},1000);

// YES / NO
let size=16;

no.onclick=()=>{
  size+=10;
  yes.style.fontSize=size+"px";

  no.style.position="absolute";
  no.style.left=Math.random()*200+"px";
  no.style.top=Math.random()*200+"px";
};

yes.onclick=()=>{
  intro.style.display="none";
  gifts.style.display="block";
  music.play();
};

// GIFTS
function openGift(i){
  if(i===0){
    cake.style.display="block";
  }
  if(i===1){
    letter.style.display="block";
    typeLetter();
  }
  if(i===2){
    explodeLove();
  }
  if(i===3){
    flowers.style.display="block";
    setTimeout(startStars,2000);
  }
}

// LETTER TYPING
let text="Happy Birthday Yoosu 💗\nYou are my safe place.\nI love you forever.";
let idx=0;

function typeLetter(){
  let typing=setInterval(()=>{
    letter.innerHTML+=text[idx];
    idx++;
    if(idx>=text.length) clearInterval(typing);
  },50);
}

// LOVE EXPLOSION
function explodeLove(){
  for(let i=0;i<30;i++){
    let l=document.createElement("div");
    l.className="love";
    l.innerText="I LOVE YOU 💖";
    l.style.top=Math.random()*100+"%";
    l.style.left=Math.random()*100+"%";
    document.body.appendChild(l);
  }
}

// STARS
function startStars(){
  main.style.display="none";
  stars.style.display="block";

  for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    stars.appendChild(s);
  }
}
</script>

</body>
</html>
